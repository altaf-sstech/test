# Usage:
# docker-compose up -d                    # Start all services
# docker-compose down                     # Stop all services
# docker-compose logs -f frontend         # View logs
# docker-compose ps                       # Check status




services:

  # ✅ PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: demo-postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    networks:
      - microservices-network
    restart: unless-stopped

  # ✅ User Service
  user-service:
    image: altaf7258/demo-user-service:latest
    container_name: demo-user-service
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=production
      - PORT=5002
      - SERVICE_NAME=user-service
      - DATABASE_URL=postgres://myuser:mypassword@postgres:5432/mydb ✅
    depends_on:
      - postgres
    networks:
      - microservices-network
    restart: unless-stopped

  # ✅ Content Service
  content-service:
    image: altaf7258/demo-content-service:latest
    container_name: demo-content-service
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - SERVICE_NAME=content-service
      - DATABASE_URL=postgres://myuser:mypassword@postgres:5432/mydb ✅
    depends_on:
      - postgres
    networks:
      - microservices-network
    restart: unless-stopped

  # ✅ Frontend
  frontend:
    image: altaf7258/demo-frontend:latest
    container_name: demo-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_BASE_URL=http://13.239.134.203:5001 ✅
      - REACT_APP_USER_API_URL=http://13.239.134.203:5002 ✅
    depends_on:
      - user-service
      - content-service
    networks:
      - microservices-network
    restart: unless-stopped

networks:
  microservices-network:
    driver: bridge


